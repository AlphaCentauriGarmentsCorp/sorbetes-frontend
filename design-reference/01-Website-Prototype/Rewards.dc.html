<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <title>Rewards — Sorbetes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <style>
    html, body { margin: 0; padding: 0; background: #FBFAF7; font-family: 'Archivo', Helvetica, Arial, sans-serif; color: #141414; min-height: 100vh; }
    * { box-sizing: border-box; }
  </style>
</helmet>

<div style="min-height: 100vh; display: flex; flex-direction: column; padding-bottom: 70px;">
  <header style="padding: 16px; display: flex; align-items: center; gap: 14px;">
    <a href="Home Signed In.dc.html" aria-label="Back" style="width: 36px; height: 36px; border-radius: 50%; background: #F0EDE4; display: grid; place-items: center; text-decoration: none; color: #111111; font-size: 16px;">←</a>
    <span style="font-size: 18px; font-weight: 900; text-transform: uppercase;">Settings</span>
  </header>

  <div class="chips-row" style="overflow-x: auto; -webkit-overflow-scrolling: touch;">
    <div style="max-width: 640px; margin: 0 auto; padding: 0 16px 14px 16px; display: flex; gap: 8px; width: max-content; min-width: 100%;">
      <sc-for list="{{ settingsNav }}" as="s" hint-placeholder-count="5">
        <a href="{{ s.href }}" style="{{ s.style }}">{{ s.label }}</a>
      </sc-for>
    </div>
  </div>

  <main style="flex: 1;">
    <div style="max-width: 520px; margin: 0 auto; padding: 0 16px; display: flex; flex-direction: column; gap: 22px;">

      <sc-if value="{{ isRedeemed }}" hint-placeholder-val="{{ false }}">
        <div style="background: #FFFBF0; border: 1px solid #FFD400; color: #6A5A00; font-size: 13px; font-weight: 700; padding: 10px 14px; border-radius: 10px;">Reward redeemed! We'll apply it to your next order.</div>
      </sc-if>

      <div style="display: flex; align-items: baseline; gap: 8px;">
        <span style="font-size: 32px; font-weight: 900;">340</span>
        <span style="font-size: 14px; font-weight: 700; color: #7A766C;">points available</span>
      </div>

      <div>
        <div style="font-size: 12px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.08em; color: #7A766C; margin-bottom: 10px;">Redeem</div>
        <div style="display: flex; flex-direction: column; gap: 8px;">
          <sc-for list="{{ redemptions }}" as="r" hint-placeholder-count="3">
            <div style="background: #FFFFFF; border: 1px solid #E7E2D5; border-radius: 14px; padding: 16px; display: flex; align-items: center; gap: 12px;">
              <div style="display: flex; flex-direction: column; gap: 2px; flex: 1;">
                <span style="font-size: 14px; font-weight: 800;">{{ r.label }}</span>
                <span style="font-size: 12px; color: #7A766C;">{{ r.cost }} points</span>
              </div>
              <button onClick="{{ r.redeem }}" style="{{ r.style }}">{{ r.btnLabel }}</button>
            </div>
          </sc-for>
        </div>
      </div>

      <div>
        <div style="font-size: 12px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.08em; color: #7A766C; margin-bottom: 10px;">History</div>
        <div style="background: #FFFFFF; border: 1px solid #E7E2D5; border-radius: 14px; overflow: hidden;">
          <sc-for list="{{ history }}" as="h" hint-placeholder-count="4">
            <div style="display: flex; justify-content: space-between; gap: 16px; padding: 12px 16px; border-top: 1px solid #EEEAE0; font-size: 13px;">
              <span style="color: #4A4740; font-weight: 600;">{{ h.label }}</span>
              <span style="font-weight: 800; color: {{ h.color }};">{{ h.points }}</span>
            </div>
          </sc-for>
        </div>
      </div>
    </div>
  </main>

  <nav style="position: fixed; left: 0; right: 0; bottom: 0; background: #FFFFFF; border-top: 1px solid #E7E2D5; display: flex; padding: 8px 8px calc(8px + env(safe-area-inset-bottom)) 8px;">
    <sc-for list="{{ tabs }}" as="t" hint-placeholder-count="4">
      <a href="{{ t.href }}" style="{{ t.style }}">
        <span style="font-size: 18px;">{{ t.icon }}</span>
        <span style="font-size: 10px; font-weight: 800; text-transform: uppercase;">{{ t.label }}</span>
      </a>
    </sc-for>
  </nav>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { redeemedKey: null };

  settingsNavDefs(active) {
    const defs = [
      { key: 'account', label: 'Account', href: 'Account.dc.html' },
      { key: 'address', label: 'Address', href: 'Address.dc.html' },
      { key: 'password', label: 'Password', href: 'Password.dc.html' },
      { key: 'club', label: 'Founder\u2019s Club', href: 'Sorbetes Founders Club.dc.html' },
      { key: 'rewards', label: 'Rewards', href: 'Rewards.dc.html' },
    ];
    return defs.map(d => ({
      ...d,
      style: {
        flexShrink: 0, padding: '9px 14px', borderRadius: 999, textDecoration: 'none',
        fontSize: 13, fontWeight: 800, whiteSpace: 'nowrap',
        border: d.key === active ? '2px solid #111111' : '2px solid #E0DBCD',
        background: d.key === active ? '#111111' : '#FFFFFF',
        color: d.key === active ? '#FFD400' : '#141414',
      },
    }));
  }

  tabDefs(active) {
    const defs = [
      { key: 'home', label: 'Home', icon: '🏠', href: 'Home Signed In.dc.html' },
      { key: 'orders', label: 'Orders', icon: '📦', href: 'My Orders.dc.html' },
      { key: 'chat', label: 'Chat', icon: '💬', href: 'Signed In Chatbot.dc.html' },
      { key: 'account', label: 'Account', icon: '👤', href: 'Account.dc.html' },
    ];
    return defs.map(t => ({
      ...t,
      style: {
        flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 3,
        padding: '6px 4px', textDecoration: 'none',
        color: t.key === active ? '#111111' : '#B3AD9E',
      },
    }));
  }

  renderVals() {
    const rewardDefs = [
      { key: 'discount150', label: '\u20B1150 off your next order', cost: 150 },
      { key: 'discount300', label: '\u20B1300 off your next order', cost: 300 },
      { key: 'freeship', label: 'Free delivery, next order', cost: 400 },
    ];
    const points = 340;
    const redemptions = rewardDefs.map(r => {
      const canAfford = points >= r.cost;
      const redeemed = this.state.redeemedKey === r.key;
      return {
        label: r.label, cost: r.cost,
        btnLabel: redeemed ? 'Redeemed' : 'Redeem',
        redeem: () => { if (canAfford && !redeemed) this.setState({ redeemedKey: r.key }); },
        style: {
          background: redeemed ? '#EAF6EC' : canAfford ? '#111111' : '#EEEAE0',
          color: redeemed ? '#2F7D4A' : canAfford ? '#FFD400' : '#A8A398',
          border: 'none', fontFamily: 'inherit', fontWeight: 800, fontSize: 12,
          padding: '9px 14px', borderRadius: 999, cursor: canAfford && !redeemed ? 'pointer' : 'default',
          whiteSpace: 'nowrap',
        },
      };
    });

    return {
      settingsNav: this.settingsNavDefs('rewards'),
      tabs: this.tabDefs('account'),
      isRedeemed: !!this.state.redeemedKey,
      redemptions,
      history: [
        { label: 'Order #10399 \u2014 earned', points: '+80', color: '#2F7D4A' },
        { label: 'Order #10201 \u2014 earned', points: '+87', color: '#2F7D4A' },
        { label: 'Order #10098 \u2014 earned', points: '+29', color: '#2F7D4A' },
        { label: 'Welcome bonus', points: '+50', color: '#2F7D4A' },
      ],
    };
  }
}
</script>
</body>
</html>
