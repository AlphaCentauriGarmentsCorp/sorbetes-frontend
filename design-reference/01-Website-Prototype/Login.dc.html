<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <title>Log in — Sorbetes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <style>
    html, body { margin: 0; padding: 0; background: #FBFAF7; font-family: 'Archivo', Helvetica, Arial, sans-serif; color: #141414; min-height: 100vh; }
    * { box-sizing: border-box; }
    input { font-family: inherit; }
    input::placeholder { color: #A8A398; }
  </style>
</helmet>

<div style="min-height: 100vh; display: flex; flex-direction: column;">
  <header style="padding: 20px 16px;">
    <a href="Home.dc.html" style="display: flex; align-items: center; gap: 10px; text-decoration: none; width: fit-content;">
      <img src="uploads/Logo%20too.jpg" alt="Sorbetes logo" style="width: 32px; height: 32px; border-radius: 50%; display: block;">
      <span style="color: #111111; font-weight: 900; font-size: 16px; letter-spacing: 0.05em; text-transform: uppercase;">Sorbetes</span>
    </a>
  </header>

  <main style="flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px 16px 60px 16px;">
    <div style="width: 100%; max-width: 380px; display: flex; flex-direction: column; gap: 22px;">
      <div>
        <h1 style="margin: 0 0 6px 0; font-size: 30px; font-weight: 900; text-transform: uppercase; letter-spacing: -0.01em;">Log in</h1>
        <p style="margin: 0; font-size: 14px; color: #7A766C;">Track orders, manage your account, and reorder faster.</p>
      </div>

      <div style="display: flex; flex-direction: column; gap: 12px;">
        <div style="display: flex; flex-direction: column; gap: 6px;">
          <label style="font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.04em; color: #4A4740;">Email or phone</label>
          <input type="text" value="{{ identifier }}" onChange="{{ onIdentifier }}" placeholder="you@brand.com" style="{{ inputStyle }}">
        </div>
        <div style="display: flex; flex-direction: column; gap: 6px;">
          <div style="display: flex; align-items: baseline;">
            <label style="font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.04em; color: #4A4740;">Password</label>
            <a href="Forgot Password.dc.html" style="margin-left: auto; font-size: 12px; font-weight: 700; color: #7A766C; text-decoration: none;">Forgot password?</a>
          </div>
          <input type="password" value="{{ password }}" onChange="{{ onPassword }}" placeholder="••••••••" style="{{ inputStyle }}">
        </div>
      </div>

      <button onClick="{{ submit }}" style="background: #111111; color: #FFFFFF; border: none; font-family: inherit; font-weight: 900; font-size: 15px; padding: 15px; border-radius: 999px; cursor: pointer; text-transform: uppercase; letter-spacing: 0.03em;">Continue</button>

      <div style="text-align: center; font-size: 13px; color: #7A766C;">
        New here? <a href="Registration.dc.html" style="color: #111111; font-weight: 800; text-decoration: none; border-bottom: 2px solid #FFD400;">Create an account</a>
      </div>
    </div>
  </main>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { identifier: '', password: '' };

  renderVals() {
    const inputStyle = {
      border: '2px solid #E0DBCD', borderRadius: 10, padding: '13px 14px',
      fontSize: 14, outline: 'none',
    };
    return {
      identifier: this.state.identifier,
      password: this.state.password,
      onIdentifier: (e) => this.setState({ identifier: e.target.value }),
      onPassword: (e) => this.setState({ password: e.target.value }),
      inputStyle,
      submit: () => { window.location.href = 'Login OTP.dc.html'; },
    };
  }
}
</script>
</body>
</html>
