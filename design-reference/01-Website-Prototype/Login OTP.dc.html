<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <title>Verify — Sorbetes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <style>
    html, body { margin: 0; padding: 0; background: #FBFAF7; font-family: 'Archivo', Helvetica, Arial, sans-serif; color: #141414; min-height: 100vh; }
    * { box-sizing: border-box; }
    input { font-family: inherit; }
  </style>
</helmet>

<div style="min-height: 100vh; display: flex; flex-direction: column;">
  <header style="padding: 20px 16px;">
    <a href="Home.dc.html" style="display: flex; align-items: center; gap: 10px; text-decoration: none; width: fit-content;">
      <img src="uploads/Logo%20too.jpg" alt="Sorbetes logo" style="width: 32px; height: 32px; border-radius: 50%; display: block;">
      <span style="color: #111111; font-weight: 900; font-size: 16px; letter-spacing: 0.05em; text-transform: uppercase;">Sorbetes</span>
    </a>
  </header>

  <main style="flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px 16px 60px 16px;">
    <div style="width: 100%; max-width: 380px; display: flex; flex-direction: column; gap: 22px; text-align: center;">
      <div>
        <h1 style="margin: 0 0 6px 0; font-size: 28px; font-weight: 900; text-transform: uppercase; letter-spacing: -0.01em;">Enter the code</h1>
        <p style="margin: 0; font-size: 14px; color: #7A766C;">We sent a 6-digit code to your phone.</p>
      </div>

      <div style="display: flex; gap: 8px; justify-content: center;">
        <sc-for list="{{ digits }}" as="d" hint-placeholder-count="6">
          <input type="text" inputMode="numeric" maxLength="1" value="{{ d.value }}" onChange="{{ d.onChange }}" style="{{ d.style }}">
        </sc-for>
      </div>

      <sc-if value="{{ showError }}" hint-placeholder-val="{{ false }}">
        <div style="background: #FBE9E7; border: 1px solid #E6A499; color: #A6392C; font-size: 13px; font-weight: 700; padding: 10px 14px; border-radius: 10px;">Incorrect code — please try again.</div>
      </sc-if>

      <button onClick="{{ submit }}" style="background: #111111; color: #FFFFFF; border: none; font-family: inherit; font-weight: 900; font-size: 15px; padding: 15px; border-radius: 999px; cursor: pointer; text-transform: uppercase; letter-spacing: 0.03em;">Verify</button>

      <div style="font-size: 13px; color: #7A766C;">Didn't get it? <button onClick="{{ resend }}" style="background: none; border: none; padding: 0; font-family: inherit; color: #111111; font-weight: 800; text-decoration: underline; cursor: pointer; font-size: 13px;">Resend code</button></div>
    </div>
  </main>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { values: ['', '', '', '', '', ''], showError: false };

  renderVals() {
    const baseStyle = (has) => ({
      width: 44, height: 54, textAlign: 'center', fontSize: 22, fontWeight: 800,
      border: this.state.showError ? '2px solid #E6A499' : '2px solid #E0DBCD',
      borderRadius: 10, outline: 'none',
    });
    const digits = this.state.values.map((v, i) => ({
      value: v,
      style: baseStyle(),
      onChange: (e) => {
        const val = e.target.value.replace(/\D/g, '').slice(-1);
        this.setState(s => {
          const next = [...s.values]; next[i] = val;
          return { values: next, showError: false };
        });
      },
    }));
    return {
      digits,
      showError: this.state.showError,
      resend: () => this.setState({ showError: false, values: ['', '', '', '', '', ''] }),
      submit: () => {
        const code = this.state.values.join('');
        if (code.length < 6) { this.setState({ showError: true }); return; }
        // Demo: any 6-digit code except 000000 succeeds
        if (code === '000000') { this.setState({ showError: true }); return; }
        window.location.href = 'Home Signed In.dc.html';
      },
    };
  }
}
</script>
</body>
</html>
