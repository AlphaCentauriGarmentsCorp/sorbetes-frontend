<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <title>Forgot password — Sorbetes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <style>
    html, body { margin: 0; padding: 0; background: #FBFAF7; font-family: 'Archivo', Helvetica, Arial, sans-serif; color: #141414; min-height: 100vh; }
    * { box-sizing: border-box; }
    input { font-family: inherit; }
    input::placeholder { color: #A8A398; }
  </style>
</helmet>

<div style="min-height: 100vh; display: flex; flex-direction: column;">
  <header style="padding: 20px 16px;">
    <a href="Home.dc.html" style="display: flex; align-items: center; gap: 10px; text-decoration: none; width: fit-content;">
      <img src="uploads/Logo%20too.jpg" alt="Sorbetes logo" style="width: 32px; height: 32px; border-radius: 50%; display: block;">
      <span style="color: #111111; font-weight: 900; font-size: 16px; letter-spacing: 0.05em; text-transform: uppercase;">Sorbetes</span>
    </a>
  </header>

  <main style="flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px 16px 60px 16px;">
    <div style="width: 100%; max-width: 380px; display: flex; flex-direction: column; gap: 22px;">
      <sc-if value="{{ sent }}" hint-placeholder-val="{{ false }}">
        <div style="display: flex; flex-direction: column; gap: 18px; text-align: center;">
          <div style="width: 54px; height: 54px; border-radius: 50%; background: #FFD400; display: grid; place-items: center; font-size: 24px; font-weight: 900; margin: 0 auto;">✓</div>
          <div>
            <h1 style="margin: 0 0 6px 0; font-size: 26px; font-weight: 900; text-transform: uppercase;">Check your inbox</h1>
            <p style="margin: 0; font-size: 14px; color: #7A766C;">We sent a reset link to {{ email }}. It expires in 15 minutes.</p>
          </div>
          <a href="Login.dc.html" style="color: #111111; font-weight: 800; font-size: 14px; text-decoration: none; border-bottom: 2px solid #FFD400; align-self: center;">Back to log in</a>
        </div>
      </sc-if>
      <sc-if value="{{ notSent }}" hint-placeholder-val="{{ true }}">
        <div style="display: flex; flex-direction: column; gap: 20px;">
          <div>
            <h1 style="margin: 0 0 6px 0; font-size: 28px; font-weight: 900; text-transform: uppercase; letter-spacing: -0.01em;">Forgot password?</h1>
            <p style="margin: 0; font-size: 14px; color: #7A766C;">Enter your email and we'll send a reset link.</p>
          </div>
          <input type="email" value="{{ email }}" onChange="{{ onEmail }}" placeholder="you@brand.com" style="border: 2px solid #E0DBCD; border-radius: 10px; padding: 13px 14px; font-size: 14px; outline: none;">
          <button onClick="{{ submit }}" style="background: #111111; color: #FFFFFF; border: none; font-family: inherit; font-weight: 900; font-size: 15px; padding: 15px; border-radius: 999px; cursor: pointer; text-transform: uppercase; letter-spacing: 0.03em;">Send reset link</button>
          <a href="Login.dc.html" style="text-align: center; color: #7A766C; font-weight: 700; font-size: 13px; text-decoration: none;">Back to log in</a>
        </div>
      </sc-if>
    </div>
  </main>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { email: '', sent: false };

  renderVals() {
    return {
      email: this.state.email,
      onEmail: (e) => this.setState({ email: e.target.value }),
      sent: this.state.sent,
      notSent: !this.state.sent,
      submit: () => this.setState({ sent: true }),
    };
  }
}
</script>
</body>
</html>
