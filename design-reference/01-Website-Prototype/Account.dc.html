<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <title>Account — Sorbetes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <style>
    html, body { margin: 0; padding: 0; background: #FBFAF7; font-family: 'Archivo', Helvetica, Arial, sans-serif; color: #141414; min-height: 100vh; }
    * { box-sizing: border-box; }
    input { font-family: inherit; }
  </style>
</helmet>

<div style="min-height: 100vh; display: flex; flex-direction: column; padding-bottom: 70px;">
  <header style="padding: 16px; display: flex; align-items: center; gap: 14px;">
    <a href="Home Signed In.dc.html" aria-label="Back" style="width: 36px; height: 36px; border-radius: 50%; background: #F0EDE4; display: grid; place-items: center; text-decoration: none; color: #111111; font-size: 16px;">←</a>
    <span style="font-size: 18px; font-weight: 900; text-transform: uppercase;">Settings</span>
  </header>

  <div class="chips-row" style="overflow-x: auto; -webkit-overflow-scrolling: touch;">
    <div style="max-width: 640px; margin: 0 auto; padding: 0 16px 14px 16px; display: flex; gap: 8px; width: max-content; min-width: 100%;">
      <sc-for list="{{ settingsNav }}" as="s" hint-placeholder-count="5">
        <a href="{{ s.href }}" style="{{ s.style }}">{{ s.label }}</a>
      </sc-for>
    </div>
  </div>

  <main style="flex: 1;">
    <div style="max-width: 480px; margin: 0 auto; padding: 0 16px; display: flex; flex-direction: column; gap: 20px;">

      <sc-if value="{{ isSaved }}" hint-placeholder-val="{{ false }}">
        <div style="background: #FFFBF0; border: 1px solid #FFD400; color: #6A5A00; font-size: 13px; font-weight: 700; padding: 10px 14px; border-radius: 10px;">Profile updated successfully.</div>
      </sc-if>

      <div style="display: flex; align-items: center; gap: 14px;">
        <div style="width: 56px; height: 56px; border-radius: 50%; background: #FFD400; display: grid; place-items: center; font-weight: 900; font-size: 20px;">JD</div>
        <div>
          <div style="font-size: 17px; font-weight: 800;">{{ name }}</div>
          <div style="font-size: 13px; color: #7A766C;">{{ brand }}</div>
        </div>
      </div>

      <sc-if value="{{ isEditing }}" hint-placeholder-val="{{ false }}">
        <div style="display: flex; flex-direction: column; gap: 12px;">
          <input type="text" value="{{ name }}" onChange="{{ onName }}" placeholder="Full name" style="border: 2px solid #E0DBCD; border-radius: 10px; padding: 13px 14px; font-size: 14px; outline: none;">
          <input type="text" value="{{ brand }}" onChange="{{ onBrand }}" placeholder="Brand name" style="border: 2px solid #E0DBCD; border-radius: 10px; padding: 13px 14px; font-size: 14px; outline: none;">
          <input type="email" value="{{ email }}" onChange="{{ onEmail }}" placeholder="Email" style="border: 2px solid #E0DBCD; border-radius: 10px; padding: 13px 14px; font-size: 14px; outline: none;">
          <input type="tel" value="{{ phone }}" onChange="{{ onPhone }}" placeholder="Phone" style="border: 2px solid #E0DBCD; border-radius: 10px; padding: 13px 14px; font-size: 14px; outline: none;">
          <div style="display: flex; gap: 10px;">
            <button onClick="{{ cancelEdit }}" style="flex: 1; background: transparent; color: #111111; border: 2px solid #E0DBCD; font-family: inherit; font-weight: 800; font-size: 14px; padding: 13px; border-radius: 999px; cursor: pointer;">Cancel</button>
            <button onClick="{{ save }}" style="flex: 1; background: #111111; color: #FFFFFF; border: none; font-family: inherit; font-weight: 900; font-size: 14px; padding: 13px; border-radius: 999px; cursor: pointer; text-transform: uppercase; letter-spacing: 0.03em;">Save changes</button>
          </div>
        </div>
      </sc-if>

      <sc-if value="{{ isViewing }}" hint-placeholder-val="{{ true }}">
        <div style="display: flex; flex-direction: column; gap: 8px;">
          <div style="background: #FFFFFF; border: 1px solid #E7E2D5; border-radius: 14px; overflow: hidden;">
            <sc-for list="{{ fields }}" as="f" hint-placeholder-count="4">
              <div style="display: flex; justify-content: space-between; gap: 16px; padding: 13px 16px; border-top: 1px solid #EEEAE0; font-size: 14px;">
                <span style="color: #7A766C; font-weight: 600;">{{ f.label }}</span>
                <span style="font-weight: 800;">{{ f.value }}</span>
              </div>
            </sc-for>
          </div>
          <button onClick="{{ startEdit }}" style="align-self: flex-start; background: none; border: none; padding: 0; font-family: inherit; font-size: 13px; font-weight: 800; color: #111111; text-decoration: none; border-bottom: 2px solid #FFD400; cursor: pointer;">Edit profile</button>
        </div>
      </sc-if>

      <div style="border-top: 1px solid #E7E2D5; padding-top: 16px;">
        <button onClick="{{ openDelete }}" style="background: none; border: none; padding: 0; font-family: inherit; font-size: 13px; font-weight: 700; color: #A6392C; cursor: pointer;">Delete account</button>
      </div>
    </div>
  </main>

  <sc-if value="{{ deleteOpen }}" hint-placeholder-val="{{ false }}">
    <div style="position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; padding: 20px; z-index: 90;" onClick="{{ closeDelete }}">
      <div style="background: #FFFFFF; border-radius: 18px; padding: 24px; max-width: 360px; width: 100%; display: flex; flex-direction: column; gap: 14px;" onClick="{{ stop }}">
        <span style="font-size: 18px; font-weight: 900; text-transform: uppercase;">Delete account?</span>
        <p style="margin: 0; font-size: 14px; color: #4A4740; line-height: 1.5;">This removes your order history and Founder's Club points. This can't be undone.</p>
        <div style="display: flex; gap: 10px;">
          <button onClick="{{ closeDelete }}" style="flex: 1; background: transparent; color: #111111; border: 2px solid #E0DBCD; font-family: inherit; font-weight: 800; font-size: 13px; padding: 12px; border-radius: 999px; cursor: pointer;">Cancel</button>
          <button style="flex: 1; background: #A6392C; color: #FFFFFF; border: none; font-family: inherit; font-weight: 800; font-size: 13px; padding: 12px; border-radius: 999px; cursor: pointer;">Delete</button>
        </div>
      </div>
    </div>
  </sc-if>

  <nav style="position: fixed; left: 0; right: 0; bottom: 0; background: #FFFFFF; border-top: 1px solid #E7E2D5; display: flex; padding: 8px 8px calc(8px + env(safe-area-inset-bottom)) 8px;">
    <sc-for list="{{ tabs }}" as="t" hint-placeholder-count="4">
      <a href="{{ t.href }}" style="{{ t.style }}">
        <span style="font-size: 18px;">{{ t.icon }}</span>
        <span style="font-size: 10px; font-weight: 800; text-transform: uppercase;">{{ t.label }}</span>
      </a>
    </sc-for>
  </nav>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = {
    mode: 'view', saved: false, deleteOpen: false,
    name: 'Juan Dela Cruz', brand: 'Kanto Klub', email: 'juan@kantoklub.ph', phone: '+63 917 000 0000',
  };

  settingsNavDefs(active) {
    const defs = [
      { key: 'account', label: 'Account', href: 'Account.dc.html' },
      { key: 'address', label: 'Address', href: 'Address.dc.html' },
      { key: 'password', label: 'Password', href: 'Password.dc.html' },
      { key: 'club', label: 'Founder\u2019s Club', href: 'Sorbetes Founders Club.dc.html' },
      { key: 'rewards', label: 'Rewards', href: 'Rewards.dc.html' },
    ];
    return defs.map(d => ({
      ...d,
      style: {
        flexShrink: 0, padding: '9px 14px', borderRadius: 999, textDecoration: 'none',
        fontSize: 13, fontWeight: 800, whiteSpace: 'nowrap',
        border: d.key === active ? '2px solid #111111' : '2px solid #E0DBCD',
        background: d.key === active ? '#111111' : '#FFFFFF',
        color: d.key === active ? '#FFD400' : '#141414',
      },
    }));
  }

  tabDefs(active) {
    const defs = [
      { key: 'home', label: 'Home', icon: '🏠', href: 'Home Signed In.dc.html' },
      { key: 'orders', label: 'Orders', icon: '📦', href: 'My Orders.dc.html' },
      { key: 'chat', label: 'Chat', icon: '💬', href: 'Signed In Chatbot.dc.html' },
      { key: 'account', label: 'Account', icon: '👤', href: 'Account.dc.html' },
    ];
    return defs.map(t => ({
      ...t,
      style: {
        flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 3,
        padding: '6px 4px', textDecoration: 'none',
        color: t.key === active ? '#111111' : '#B3AD9E',
      },
    }));
  }

  renderVals() {
    return {
      settingsNav: this.settingsNavDefs('account'),
      tabs: this.tabDefs('account'),
      isSaved: this.state.saved,
      isEditing: this.state.mode === 'edit',
      isViewing: this.state.mode === 'view',
      name: this.state.name, brand: this.state.brand, email: this.state.email, phone: this.state.phone,
      onName: (e) => this.setState({ name: e.target.value }),
      onBrand: (e) => this.setState({ brand: e.target.value }),
      onEmail: (e) => this.setState({ email: e.target.value }),
      onPhone: (e) => this.setState({ phone: e.target.value }),
      startEdit: () => this.setState({ mode: 'edit', saved: false }),
      cancelEdit: () => this.setState({ mode: 'view' }),
      save: () => this.setState({ mode: 'view', saved: true }),
      fields: [
        { label: 'Full name', value: this.state.name },
        { label: 'Brand name', value: this.state.brand },
        { label: 'Email', value: this.state.email },
        { label: 'Phone', value: this.state.phone },
      ],
      deleteOpen: this.state.deleteOpen,
      openDelete: () => this.setState({ deleteOpen: true }),
      closeDelete: () => this.setState({ deleteOpen: false }),
      stop: (e) => e.stopPropagation(),
    };
  }
}
</script>
</body>
</html>
