<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <title>Order details — Sorbetes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <style>
    html, body { margin: 0; padding: 0; background: #FBFAF7; font-family: 'Archivo', Helvetica, Arial, sans-serif; color: #141414; min-height: 100vh; }
    * { box-sizing: border-box; }
  </style>
</helmet>

<div style="min-height: 100vh; display: flex; flex-direction: column; padding-bottom: 40px;">
  <header style="padding: 16px; display: flex; align-items: center; gap: 14px;">
    <a href="My Orders.dc.html" aria-label="Back" style="width: 36px; height: 36px; border-radius: 50%; background: #F0EDE4; display: grid; place-items: center; text-decoration: none; color: #111111; font-size: 16px;">←</a>
    <span style="font-size: 18px; font-weight: 900; text-transform: uppercase;">Order #{{ num }}</span>
  </header>

  <main style="flex: 1;">
    <div style="max-width: 560px; margin: 0 auto; padding: 0 16px; display: flex; flex-direction: column; gap: 20px;">
      <div style="display: flex; align-items: center; gap: 10px;">
        <span style="{{ badgeStyle }}">{{ status }}</span>
        <span style="font-size: 13px; color: #7A766C;">Placed {{ date }}</span>
      </div>

      <a href="Track Order.dc.html?id={{ num }}" style="background: #111111; color: #FFFFFF; text-decoration: none; text-align: center; font-weight: 900; font-size: 14px; padding: 14px; border-radius: 999px; text-transform: uppercase; letter-spacing: 0.03em;">Track this order</a>

      <div>
        <div style="font-size: 12px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.08em; color: #7A766C; margin-bottom: 10px;">Order details</div>
        <div style="background: #FFFFFF; border: 1px solid #E7E2D5; border-radius: 14px; overflow: hidden;">
          <sc-for list="{{ rows }}" as="r" hint-placeholder-count="6">
            <div style="display: flex; justify-content: space-between; gap: 16px; padding: 13px 16px; border-top: 1px solid #EEEAE0; font-size: 14px;">
              <span style="color: #7A766C; font-weight: 600;">{{ r.label }}</span>
              <span style="font-weight: 800; text-align: right;">{{ r.value }}</span>
            </div>
          </sc-for>
        </div>
      </div>

      <div style="background: #111111; border-radius: 14px; padding: 18px; display: flex; justify-content: space-between; align-items: baseline;">
        <span style="font-size: 12px; color: #9A9A9A; text-transform: uppercase; letter-spacing: 0.05em;">Total paid</span>
        <span style="font-size: 20px; font-weight: 900; color: #FFD400;">₱{{ total }}</span>
      </div>

      <a href="Signed In Chatbot.dc.html" style="text-align: center; font-size: 13px; font-weight: 700; color: #111111; text-decoration: none; border-bottom: 2px solid #FFD400; align-self: center;">Need help with this order? Chat with us</a>
    </div>
  </main>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  data() {
    return {
      '10482': { spec: 'Classic Tee \u00B7 CVC 240 GSM', qty: 150, status: 'In production', date: 'Jul 2, 2026', print: 'Silkscreen \u00B7 2 colors', total: 43500 },
      '10399': { spec: 'Premium Tee \u00B7 280 GSM', qty: 80, status: 'Ready to ship', date: 'Jun 28, 2026', print: 'Silkscreen \u00B7 1 color', total: 25600 },
      '10201': { spec: 'Corporate Uniform \u00B7 CVC 240 GSM', qty: 300, status: 'Delivered', date: 'Jun 10, 2026', print: 'Embroidery', total: 87000 },
      '10098': { spec: 'Classic Tee \u00B7 CVC 240 GSM', qty: 100, status: 'Delivered', date: 'May 22, 2026', print: 'Silkscreen \u00B7 1 color', total: 29000 },
      '9977': { spec: 'Hoodie', qty: 50, status: 'Cancelled', date: 'Apr 30, 2026', print: 'Silkscreen \u00B7 1 color', total: 0 },
    };
  }

  renderVals() {
    const q = new URLSearchParams(window.location.search);
    const num = q.get('id') || '10482';
    const o = this.data()[num] || this.data()['10482'];
    const badgeColor = {
      'In production': ['#FFD400', '#111111'], 'Ready to ship': ['#111111', '#FFD400'],
      'Delivered': ['#EAF6EC', '#2F7D4A'], 'Cancelled': ['#F5EDEA', '#A8A398'],
    };
    const [bg, fg] = badgeColor[o.status] || ['#EEEAE0', '#4A4740'];
    return {
      num, status: o.status, date: o.date,
      badgeStyle: { background: bg, color: fg, fontSize: 11, fontWeight: 900, padding: '6px 12px', borderRadius: 999, textTransform: 'uppercase', letterSpacing: '0.04em' },
      rows: [
        { label: 'Product', value: o.spec },
        { label: 'Quantity', value: o.qty + ' pcs' },
        { label: 'Print', value: o.print },
        { label: 'Packing', value: 'Etiketa + ziploc (free)' },
      ],
      total: o.total.toLocaleString(),
    };
  }
}
</script>
</body>
</html>
