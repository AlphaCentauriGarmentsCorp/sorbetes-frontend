<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <title>Password — Sorbetes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <style>
    html, body { margin: 0; padding: 0; background: #FBFAF7; font-family: 'Archivo', Helvetica, Arial, sans-serif; color: #141414; min-height: 100vh; }
    * { box-sizing: border-box; }
    input { font-family: inherit; }
  </style>
</helmet>

<div style="min-height: 100vh; display: flex; flex-direction: column; padding-bottom: 70px;">
  <header style="padding: 16px; display: flex; align-items: center; gap: 14px;">
    <a href="Home Signed In.dc.html" aria-label="Back" style="width: 36px; height: 36px; border-radius: 50%; background: #F0EDE4; display: grid; place-items: center; text-decoration: none; color: #111111; font-size: 16px;">←</a>
    <span style="font-size: 18px; font-weight: 900; text-transform: uppercase;">Settings</span>
  </header>

  <div class="chips-row" style="overflow-x: auto; -webkit-overflow-scrolling: touch;">
    <div style="max-width: 640px; margin: 0 auto; padding: 0 16px 14px 16px; display: flex; gap: 8px; width: max-content; min-width: 100%;">
      <sc-for list="{{ settingsNav }}" as="s" hint-placeholder-count="5">
        <a href="{{ s.href }}" style="{{ s.style }}">{{ s.label }}</a>
      </sc-for>
    </div>
  </div>

  <main style="flex: 1;">
    <div style="max-width: 420px; margin: 0 auto; padding: 0 16px; display: flex; flex-direction: column; gap: 18px;">

      <sc-if value="{{ isDone }}" hint-placeholder-val="{{ false }}">
        <div style="display: flex; flex-direction: column; align-items: center; gap: 16px; text-align: center; padding-top: 20px;">
          <div style="width: 54px; height: 54px; border-radius: 50%; background: #FFD400; display: grid; place-items: center; font-size: 24px; font-weight: 900;">✓</div>
          <div>
            <h1 style="margin: 0 0 6px 0; font-size: 22px; font-weight: 900; text-transform: uppercase;">Password changed</h1>
            <p style="margin: 0; font-size: 14px; color: #7A766C;">Use your new password next time you log in.</p>
          </div>
        </div>
      </sc-if>

      <sc-if value="{{ isForm }}" hint-placeholder-val="{{ true }}">
        <div style="display: flex; flex-direction: column; gap: 14px;">
          <h1 style="margin: 0; font-size: 22px; font-weight: 900; text-transform: uppercase;">Change password</h1>
          <input type="password" placeholder="Current password" style="border: 2px solid #E0DBCD; border-radius: 10px; padding: 13px 14px; font-size: 14px; outline: none;">
          <input type="password" value="{{ pw1 }}" onChange="{{ onPw1 }}" placeholder="New password" style="border: 2px solid #E0DBCD; border-radius: 10px; padding: 13px 14px; font-size: 14px; outline: none;">
          <input type="password" value="{{ pw2 }}" onChange="{{ onPw2 }}" placeholder="Confirm new password" style="border: 2px solid #E0DBCD; border-radius: 10px; padding: 13px 14px; font-size: 14px; outline: none;">
          <sc-if value="{{ showMismatch }}" hint-placeholder-val="{{ false }}">
            <div style="background: #FBE9E7; border: 1px solid #E6A499; color: #A6392C; font-size: 13px; font-weight: 700; padding: 10px 14px; border-radius: 10px;">Passwords don't match, or are too short (min. 8 characters).</div>
          </sc-if>
          <button onClick="{{ submit }}" style="background: #111111; color: #FFFFFF; border: none; font-family: inherit; font-weight: 900; font-size: 15px; padding: 15px; border-radius: 999px; cursor: pointer; text-transform: uppercase; letter-spacing: 0.03em;">Update password</button>
        </div>
      </sc-if>
    </div>
  </main>

  <nav style="position: fixed; left: 0; right: 0; bottom: 0; background: #FFFFFF; border-top: 1px solid #E7E2D5; display: flex; padding: 8px 8px calc(8px + env(safe-area-inset-bottom)) 8px;">
    <sc-for list="{{ tabs }}" as="t" hint-placeholder-count="4">
      <a href="{{ t.href }}" style="{{ t.style }}">
        <span style="font-size: 18px;">{{ t.icon }}</span>
        <span style="font-size: 10px; font-weight: 800; text-transform: uppercase;">{{ t.label }}</span>
      </a>
    </sc-for>
  </nav>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { pw1: '', pw2: '', done: false, showMismatch: false };

  settingsNavDefs(active) {
    const defs = [
      { key: 'account', label: 'Account', href: 'Account.dc.html' },
      { key: 'address', label: 'Address', href: 'Address.dc.html' },
      { key: 'password', label: 'Password', href: 'Password.dc.html' },
      { key: 'club', label: 'Founder\u2019s Club', href: 'Sorbetes Founders Club.dc.html' },
      { key: 'rewards', label: 'Rewards', href: 'Rewards.dc.html' },
    ];
    return defs.map(d => ({
      ...d,
      style: {
        flexShrink: 0, padding: '9px 14px', borderRadius: 999, textDecoration: 'none',
        fontSize: 13, fontWeight: 800, whiteSpace: 'nowrap',
        border: d.key === active ? '2px solid #111111' : '2px solid #E0DBCD',
        background: d.key === active ? '#111111' : '#FFFFFF',
        color: d.key === active ? '#FFD400' : '#141414',
      },
    }));
  }

  tabDefs(active) {
    const defs = [
      { key: 'home', label: 'Home', icon: '🏠', href: 'Home Signed In.dc.html' },
      { key: 'orders', label: 'Orders', icon: '📦', href: 'My Orders.dc.html' },
      { key: 'chat', label: 'Chat', icon: '💬', href: 'Signed In Chatbot.dc.html' },
      { key: 'account', label: 'Account', icon: '👤', href: 'Account.dc.html' },
    ];
    return defs.map(t => ({
      ...t,
      style: {
        flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 3,
        padding: '6px 4px', textDecoration: 'none',
        color: t.key === active ? '#111111' : '#B3AD9E',
      },
    }));
  }

  renderVals() {
    return {
      settingsNav: this.settingsNavDefs('password'),
      tabs: this.tabDefs('account'),
      isForm: !this.state.done,
      isDone: this.state.done,
      pw1: this.state.pw1,
      pw2: this.state.pw2,
      onPw1: (e) => this.setState({ pw1: e.target.value, showMismatch: false }),
      onPw2: (e) => this.setState({ pw2: e.target.value, showMismatch: false }),
      showMismatch: this.state.showMismatch,
      submit: () => {
        if (this.state.pw1.length < 8 || this.state.pw1 !== this.state.pw2) {
          this.setState({ showMismatch: true });
          return;
        }
        this.setState({ done: true });
      },
    };
  }
}
</script>
</body>
</html>
