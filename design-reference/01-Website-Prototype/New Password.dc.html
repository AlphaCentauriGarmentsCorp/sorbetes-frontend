<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <title>Set new password — Sorbetes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <style>
    html, body { margin: 0; padding: 0; background: #FBFAF7; font-family: 'Archivo', Helvetica, Arial, sans-serif; color: #141414; min-height: 100vh; }
    * { box-sizing: border-box; }
    input { font-family: inherit; }
  </style>
</helmet>

<div style="min-height: 100vh; display: flex; flex-direction: column;">
  <header style="padding: 20px 16px;">
    <a href="Home.dc.html" style="display: flex; align-items: center; gap: 10px; text-decoration: none; width: fit-content;">
      <img src="uploads/Logo%20too.jpg" alt="Sorbetes logo" style="width: 32px; height: 32px; border-radius: 50%; display: block;">
      <span style="color: #111111; font-weight: 900; font-size: 16px; letter-spacing: 0.05em; text-transform: uppercase;">Sorbetes</span>
    </a>
  </header>

  <main style="flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px 16px 60px 16px;">
    <div style="width: 100%; max-width: 380px; display: flex; flex-direction: column; gap: 22px;">
      <sc-if value="{{ done }}" hint-placeholder-val="{{ false }}">
        <div style="display: flex; flex-direction: column; gap: 18px; text-align: center;">
          <div style="width: 54px; height: 54px; border-radius: 50%; background: #FFD400; display: grid; place-items: center; font-size: 24px; font-weight: 900; margin: 0 auto;">✓</div>
          <div>
            <h1 style="margin: 0 0 6px 0; font-size: 26px; font-weight: 900; text-transform: uppercase;">Password updated</h1>
            <p style="margin: 0; font-size: 14px; color: #7A766C;">You can now log in with your new password.</p>
          </div>
          <a href="Login.dc.html" style="background: #111111; color: #FFFFFF; text-decoration: none; font-weight: 900; font-size: 15px; padding: 15px; border-radius: 999px; text-transform: uppercase; letter-spacing: 0.03em;">Log in</a>
        </div>
      </sc-if>
      <sc-if value="{{ notDone }}" hint-placeholder-val="{{ true }}">
        <div style="display: flex; flex-direction: column; gap: 20px;">
          <div>
            <h1 style="margin: 0 0 6px 0; font-size: 28px; font-weight: 900; text-transform: uppercase; letter-spacing: -0.01em;">Set a new password</h1>
            <p style="margin: 0; font-size: 14px; color: #7A766C;">At least 8 characters.</p>
          </div>
          <input type="password" value="{{ pw1 }}" onChange="{{ onPw1 }}" placeholder="New password" style="border: 2px solid #E0DBCD; border-radius: 10px; padding: 13px 14px; font-size: 14px; outline: none;">
          <input type="password" value="{{ pw2 }}" onChange="{{ onPw2 }}" placeholder="Confirm new password" style="border: 2px solid #E0DBCD; border-radius: 10px; padding: 13px 14px; font-size: 14px; outline: none;">
          <sc-if value="{{ showMismatch }}" hint-placeholder-val="{{ false }}">
            <div style="background: #FBE9E7; border: 1px solid #E6A499; color: #A6392C; font-size: 13px; font-weight: 700; padding: 10px 14px; border-radius: 10px;">Passwords don't match.</div>
          </sc-if>
          <button onClick="{{ submit }}" style="background: #111111; color: #FFFFFF; border: none; font-family: inherit; font-weight: 900; font-size: 15px; padding: 15px; border-radius: 999px; cursor: pointer; text-transform: uppercase; letter-spacing: 0.03em;">Update password</button>
        </div>
      </sc-if>
    </div>
  </main>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { pw1: '', pw2: '', done: false, showMismatch: false };

  renderVals() {
    return {
      pw1: this.state.pw1,
      pw2: this.state.pw2,
      onPw1: (e) => this.setState({ pw1: e.target.value, showMismatch: false }),
      onPw2: (e) => this.setState({ pw2: e.target.value, showMismatch: false }),
      done: this.state.done,
      notDone: !this.state.done,
      showMismatch: this.state.showMismatch,
      submit: () => {
        if (this.state.pw1.length < 8 || this.state.pw1 !== this.state.pw2) {
          this.setState({ showMismatch: true });
          return;
        }
        this.setState({ done: true });
      },
    };
  }
}
</script>
</body>
</html>
