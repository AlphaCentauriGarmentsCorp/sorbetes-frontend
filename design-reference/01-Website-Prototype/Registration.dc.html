<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <title>Create an account — Sorbetes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <style>
    html, body { margin: 0; padding: 0; background: #FBFAF7; font-family: 'Archivo', Helvetica, Arial, sans-serif; color: #141414; min-height: 100vh; }
    * { box-sizing: border-box; }
    input { font-family: inherit; }
    input::placeholder { color: #A8A398; }
  </style>
</helmet>

<div style="min-height: 100vh; display: flex; flex-direction: column;">
  <header style="padding: 20px 16px;">
    <a href="Home.dc.html" style="display: flex; align-items: center; gap: 10px; text-decoration: none; width: fit-content;">
      <img src="uploads/Logo%20too.jpg" alt="Sorbetes logo" style="width: 32px; height: 32px; border-radius: 50%; display: block;">
      <span style="color: #111111; font-weight: 900; font-size: 16px; letter-spacing: 0.05em; text-transform: uppercase;">Sorbetes</span>
    </a>
  </header>

  <main style="flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px 16px 60px 16px;">
    <div style="width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 20px;">
      <div>
        <h1 style="margin: 0 0 6px 0; font-size: 28px; font-weight: 900; text-transform: uppercase; letter-spacing: -0.01em;">Create your account</h1>
        <p style="margin: 0; font-size: 14px; color: #7A766C;">Takes less than a minute.</p>
      </div>

      <div style="display: flex; flex-direction: column; gap: 12px;">
        <input type="text" placeholder="Full name" style="{{ inputStyle }}">
        <input type="text" placeholder="Brand name" style="{{ inputStyle }}">
        <input type="email" placeholder="Email" style="{{ inputStyle }}">
        <input type="tel" placeholder="Phone number" style="{{ inputStyle }}">
        <input type="password" placeholder="Create a password" style="{{ inputStyle }}">
      </div>

      <label style="display: flex; align-items: flex-start; gap: 10px; font-size: 13px; color: #4A4740; cursor: pointer;">
        <input type="checkbox" checked="{{ agreed }}" onChange="{{ toggleAgree }}" style="margin-top: 3px;">
        <span>I agree to the <a href="Terms and Conditions.dc.html" style="color: #111111; font-weight: 800; text-decoration: none; border-bottom: 2px solid #FFD400;">Terms & Conditions</a></span>
      </label>

      <button onClick="{{ submit }}" style="{{ submitStyle }}">Create account</button>

      <div style="text-align: center; font-size: 13px; color: #7A766C;">
        Already have an account? <a href="Login.dc.html" style="color: #111111; font-weight: 800; text-decoration: none; border-bottom: 2px solid #FFD400;">Log in</a>
      </div>
    </div>
  </main>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { agreed: false };

  renderVals() {
    const inputStyle = {
      border: '2px solid #E0DBCD', borderRadius: 10, padding: '13px 14px',
      fontSize: 14, outline: 'none', width: '100%',
    };
    return {
      inputStyle,
      agreed: this.state.agreed,
      toggleAgree: () => this.setState(s => ({ agreed: !s.agreed })),
      submitStyle: {
        background: this.state.agreed ? '#111111' : '#D8D2C0',
        color: '#FFFFFF', border: 'none', fontFamily: 'inherit', fontWeight: 900,
        fontSize: 15, padding: '15px', borderRadius: 999,
        cursor: this.state.agreed ? 'pointer' : 'not-allowed',
        textTransform: 'uppercase', letterSpacing: '0.03em',
      },
      submit: () => { if (this.state.agreed) window.location.href = 'Login OTP.dc.html'; },
    };
  }
}
</script>
</body>
</html>
