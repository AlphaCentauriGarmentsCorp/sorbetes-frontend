<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <title>My Sorbetes — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;700;800;900&display=swap" rel="stylesheet">
  <style>
    html, body { margin: 0; padding: 0; background: #FBFAF7; font-family: 'Archivo', Helvetica, Arial, sans-serif; color: #141414; min-height: 100vh; }
    * { box-sizing: border-box; }
  </style>
</helmet>

<div style="min-height: 100vh; display: flex; flex-direction: column; padding-bottom: 70px;">
  <header style="position: sticky; top: 0; z-index: 40; background: #111111;">
    <div style="max-width: 900px; margin: 0 auto; padding: 0 16px; height: 58px; display: flex; align-items: center; gap: 12px;">
      <a href="Home.dc.html" style="display: flex; align-items: center; gap: 10px; text-decoration: none;">
        <img src="uploads/Logo%20too.jpg" alt="Sorbetes logo" style="width: 32px; height: 32px; border-radius: 50%; display: block;">
        <span style="color: #FFFFFF; font-weight: 900; font-size: 15px; letter-spacing: 0.05em; text-transform: uppercase;">Sorbetes</span>
      </a>
      <div style="margin-left: auto; display: flex; align-items: center; gap: 12px;">
        <a href="Notification.dc.html" aria-label="Notifications" style="position: relative; width: 36px; height: 36px; border-radius: 50%; background: #1D1D1D; display: grid; place-items: center; text-decoration: none;">
          <span style="color: #FFFFFF; font-size: 15px;">🔔</span>
          <span style="position: absolute; top: 4px; right: 5px; width: 8px; height: 8px; border-radius: 50%; background: #FFD400;"></span>
        </a>
        <a href="Account.dc.html" aria-label="Account" style="width: 32px; height: 32px; border-radius: 50%; background: #FFD400; color: #111111; display: grid; place-items: center; font-weight: 900; font-size: 13px; text-decoration: none;">JD</a>
      </div>
    </div>
  </header>

  <main style="flex: 1;">
    <section style="max-width: 900px; margin: 0 auto; padding: 24px 16px;">
      <h1 style="margin: 0 0 4px 0; font-size: clamp(24px, 5vw, 32px); font-weight: 900; text-transform: uppercase; letter-spacing: -0.01em;">Hey, Juan 👋</h1>
      <p style="margin: 0 0 20px 0; font-size: 14px; color: #7A766C;">Here's where things stand.</p>

      <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 26px;">
        <sc-for list="{{ stats }}" as="s" hint-placeholder-count="3">
          <div style="background: #FFFFFF; border: 1px solid #E7E2D5; border-radius: 14px; padding: 16px;">
            <div style="font-size: 24px; font-weight: 900;">{{ s.value }}</div>
            <div style="font-size: 12px; font-weight: 700; color: #7A766C; text-transform: uppercase; letter-spacing: 0.04em;">{{ s.label }}</div>
          </div>
        </sc-for>
      </div>

      <div style="display: flex; align-items: baseline; margin-bottom: 12px;">
        <h2 style="margin: 0; font-size: 18px; font-weight: 900; text-transform: uppercase;">Active orders</h2>
        <a href="My Orders.dc.html" style="margin-left: auto; font-size: 13px; font-weight: 800; color: #111111; text-decoration: none; border-bottom: 2px solid #FFD400;">See all</a>
      </div>

      <div style="display: flex; flex-direction: column; gap: 10px; margin-bottom: 30px;">
        <sc-for list="{{ orders }}" as="o" hint-placeholder-count="2">
          <a href="{{ o.href }}" style="text-decoration: none; color: inherit; background: #FFFFFF; border: 1px solid #E7E2D5; border-radius: 14px; padding: 16px; display: flex; align-items: center; gap: 14px;">
            <div style="display: flex; flex-direction: column; gap: 2px; flex: 1;">
              <span style="font-size: 15px; font-weight: 800;">Order #{{ o.num }}</span>
              <span style="font-size: 13px; color: #7A766C;">{{ o.spec }}</span>
            </div>
            <span style="background: #FFD400; color: #111111; font-size: 11px; font-weight: 900; padding: 5px 10px; border-radius: 999px; text-transform: uppercase; letter-spacing: 0.04em; white-space: nowrap;">{{ o.status }}</span>
          </a>
        </sc-for>
      </div>

      <div style="background: #111111; border-radius: 16px; padding: 20px; display: flex; align-items: center; gap: 16px; flex-wrap: wrap;">
        <div style="flex: 1; min-width: 200px;">
          <div style="font-size: 12px; font-weight: 900; color: #FFD400; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px;">Founder's Club</div>
          <div style="font-size: 16px; font-weight: 800; color: #FFFFFF;">Regular tier · 340 points</div>
        </div>
        <a href="Sorbetes Founders Club.dc.html" style="background: #FFD400; color: #111111; text-decoration: none; font-weight: 900; font-size: 13px; padding: 11px 18px; border-radius: 999px; text-transform: uppercase; letter-spacing: 0.03em; white-space: nowrap;">View rewards</a>
      </div>
    </section>
  </main>

  <a href="Signed In Chatbot.dc.html" aria-label="Chat support" style="position: fixed; right: 20px; bottom: 84px; width: 54px; height: 54px; border-radius: 50%; background: #FFD400; display: grid; place-items: center; text-decoration: none; box-shadow: 0 8px 24px rgba(0,0,0,0.25); font-size: 22px;">💬</a>

  <nav style="position: fixed; left: 0; right: 0; bottom: 0; background: #FFFFFF; border-top: 1px solid #E7E2D5; display: flex; padding: 8px 8px calc(8px + env(safe-area-inset-bottom)) 8px;">
    <sc-for list="{{ tabs }}" as="t" hint-placeholder-count="4">
      <a href="{{ t.href }}" style="{{ t.style }}">
        <span style="font-size: 18px;">{{ t.icon }}</span>
        <span style="font-size: 10px; font-weight: 800; text-transform: uppercase;">{{ t.label }}</span>
      </a>
    </sc-for>
  </nav>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  tabDefs(active) {
    const defs = [
      { key: 'home', label: 'Home', icon: '🏠', href: 'Home Signed In.dc.html' },
      { key: 'orders', label: 'Orders', icon: '📦', href: 'My Orders.dc.html' },
      { key: 'chat', label: 'Chat', icon: '💬', href: 'Signed In Chatbot.dc.html' },
      { key: 'account', label: 'Account', icon: '👤', href: 'Account.dc.html' },
    ];
    return defs.map(t => ({
      ...t,
      style: {
        flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 3,
        padding: '6px 4px', textDecoration: 'none',
        color: t.key === active ? '#111111' : '#B3AD9E',
      },
    }));
  }

  renderVals() {
    return {
      tabs: this.tabDefs('home'),
      stats: [
        { value: '2', label: 'Active orders' },
        { value: '340', label: 'Reward points' },
        { value: '5', label: 'Total orders' },
      ],
      orders: [
        { num: '10482', spec: 'Classic Tee \u00B7 150 pcs', status: 'In production', href: 'My Orders Info.dc.html?id=10482' },
        { num: '10399', spec: 'Premium Tee \u00B7 80 pcs', status: 'Ready to ship', href: 'My Orders Info.dc.html?id=10399' },
      ],
    };
  }
}
</script>
</body>
</html>
