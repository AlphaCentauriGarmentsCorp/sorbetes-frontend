name: Deploy Sorbetes site to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-sorbetes-production
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (vite build -> dist/)
        run: npm run build

      - name: Deploy dist/ to Hostinger via rsync over SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.HOSTINGER_SSH_KEY }}
          RAW_HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          RAW_PORT: ${{ secrets.HOSTINGER_SSH_PORT }}
          RAW_USER: ${{ secrets.HOSTINGER_SSH_USER }}
          # Mirrors into the Sorbetes build folder ONLY. rsync --delete is scoped to this dist/,
          # so ash-ai-backend and ash-ai-frontend are never touched.
          TARGET_DIR: domains/sorbetesapparel.com/public_html/sorbetes-frontend/dist
        run: |
          set -euo pipefail
          HOST="$(printf '%s' "$RAW_HOST" | tr -d '[:space:]')"
          PORT="$(printf '%s' "$RAW_PORT" | tr -d '[:space:]')"
          USER="$(printf '%s' "$RAW_USER" | tr -d '[:space:]')"
          echo "HOST=[$HOST] len=${#HOST}"; echo "PORT=[$PORT] len=${#PORT}"; echo "USER=[$USER] len=${#USER}"
          mkdir -p ~/.ssh
          # Strip any CR characters (Windows CRLF) that corrupt the key's format.
          printf '%s\n' "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # Fail loudly (and early) if the key is still unparseable, instead of a confusing SSH error.
          if ! ssh-keygen -y -f ~/.ssh/deploy_key > /dev/null 2>&1; then
            echo "::error::HOSTINGER_SSH_KEY is not a valid private key. Re-set the secret from the raw key file (see APPLY-AND-VERIFY)."
            exit 1
          fi
          echo "deploy key parsed OK"
          ssh -i ~/.ssh/deploy_key -p "$PORT" -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new \
            "${USER}@${HOST}" "echo SSH_OK; which rsync"
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -p $PORT -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new" \
            dist/ "${USER}@${HOST}:${TARGET_DIR}/"

      - name: Done
        run: echo "Deployed. Live at https://store.sorbetesapparel.com (and https://sorbetesapparel.com once the apex .htaccess is repointed)."